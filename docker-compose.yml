services:
  web:
    build: .
    container_name: plc_demo_web
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "127.0.0.1:8001:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  bot:
    build: .
    container_name: plc_demo_bot
    command: python -m app.telegram_bot
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped
